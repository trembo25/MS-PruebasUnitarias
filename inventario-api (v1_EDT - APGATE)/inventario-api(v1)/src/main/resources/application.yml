server:
  port: 8085

spring:
  application:
    name: gestioninventario
    
  datasource:
    url: jdbc:mysql://localhost:3306/orderflow-v1-m6
    username: root
    password: ""
    
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

# Configuración de Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/