server:
    port: 8084

spring:
    application:
        name: gestioncocina

    datasource:
        url: jdbc:mysql://localhost:3306/orderflow-v1-m5
        username: root
        password: ""

    jpa:
        show-sql: true
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                format_sql: true

# Configuración de Eureka Client
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
